<!DOCTYPE html>
<html lang="ko-KR">

<head>
  <meta charset="UTF-8" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>헤더 - 쿠팡(Coupang)</title>
  <link rel="icon" href="/assets/favicon/favicon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100;300;400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./stylesheets/main.css"/>
  <script src="./js/main.js" defer></script>
</head>

<body>
  <header>
    <div class="subscribeHeader">
      <ul>
        <li>쿠팡플레이</li>
        <li>제휴마케팅</li>
        <li>로그인</li>
        <li>회원가입</li>
        <li>고객센터</li>
      </ul>
    </div>
  </header>

  <div class="container ">
    <!-- 카테고리 버튼 -->
    <div class="categorybtn">
        <div class="category-img">
          <img src="./assets/icon/hamburger.svg" alt="">  
        <br>
        <span class="category-txt">카테고리</span>
        </div>
    </div>
    
    <!-- 로고 -->
    <div class="logo">
      <h1><img src="./assets/logo/logo.png" alt=""></h1>
    </div>
    
    <!-- 검색창 -->
    <div class="search">
      <select name="choice" class="select--category">
        <option value="first" selected>전체</option>
        <option value="second" >여성의류</option>
        <option value="third">남성의류</option>
      </select>
      <input type="text" placeholder="찾고 싶은 상품을 검색해보세요!" class="coupang-search">
      <img src="./assets/icon/mic.svg" class="mic_icon" alt="">
      <img src="./assets/icon/search.svg" class="search_icon" alt="">
    </div>

    <!-- 마이쿠팡 -->
    <div class="mycupang">
      <img src="./assets/icon/my-coupang.svg" alt="">
      <p>마이쿠팡</p>
    </div>

    <!--카트 -->
      <div class="cart">
        <img src="./assets/icon/cart.svg" alt="">
        <p>장바구니</p>
        <span>0</span>
      </div>
    

    <!-- 리스트 -->
    <div class="menulist">
      <ul>
        <li><img src="./assets/icon/icon-rocket.svg" alt="">로켓배송</li>
        <li><img src="./assets/icon/icon-rocket.svg" alt="">로켓프레쉬</li>
        <li>2022년 설날<img src="./assets/icon/new.svg" alt=""></li>
        <li>로켓직구</li>
        <li>골드박스</li>
        <li>정기배송</li>
        <li>이벤트/쿠폰</li>
        <li>기획전</li>
        <li>여행티켓</li>
      </ul>
  </div>

<div class="nothing"></div>


</div>

</body>

</html>
